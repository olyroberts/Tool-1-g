<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi-Client Dashboard</title>
<style>
  :root {
    --bg: #f4f2ec;
    --surface: #ffffff;
    --surface-2: #faf9f5;
    --text: #2c2a26;
    --text-dim: #5f5d57;
    --text-faint: #908d85;
    --gold: #9a7b30;
    --line: rgba(0,0,0,0.09);
    --line-soft: rgba(0,0,0,0.05);
    --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.04);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    line-height: 1.6;
    padding: 0 0 60px;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 940px; margin: 0 auto; padding: 0 22px; }

  /* ---- Шапка ---- */
  header {
    padding: 30px 0 18px;
    text-align: center;
  }
  .kicker {
    font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--gold); margin-bottom: 8px;
  }
  header h1 { font-size: 25px; font-weight: 500; letter-spacing: 0.2px; }
  header .today { font-size: 12.5px; color: var(--text-faint); margin-top: 5px; }
  .header-title-row {
    display: inline-flex; align-items: center; gap: 8px;
  }
  .header-edit-btn {
    font-family: inherit; font-size: 12px; line-height: 1;
    width: 26px; height: 26px; padding: 0; border-radius: 7px; cursor: pointer;
    border: 1px solid var(--line); background: var(--surface); color: var(--text-faint);
    display: inline-flex; align-items: center; justify-content: center;
    transition: all 0.12s;
  }
  .header-edit-btn:hover { border-color: var(--gold); color: var(--gold); }

  /* ---- Полоса сохранения ---- */
  .savebar {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 9px; padding: 8px 14px; margin-bottom: 14px;
    font-size: 12px;
  }
  .savebar .status { color: #1d6b51; font-weight: 500; margin-right: auto; }
  .savebar .status.unsaved { color: #a33636; }
  .savebar button {
    font-family: inherit; font-size: 11.5px;
    padding: 5px 11px; border-radius: 6px; cursor: pointer;
    border: 1px solid var(--line); background: transparent; color: var(--text-dim);
    transition: all 0.12s;
  }
  .savebar button:hover { border-color: var(--gold); color: var(--text); }
  .savebar button.danger:hover { border-color: #a33636; color: #a33636; }


  /* ---- Полоса таймера (сквозная) ---- */
  .timerbar {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 10px; padding: 10px 16px; margin-bottom: 10px;
  }
  .timer-clock {
    font-family: 'SF Mono', Monaco, Consolas, monospace;
    font-size: 23px; font-weight: 600; color: var(--text);
    line-height: 1; min-width: 92px;
  }
  .timer-clock.running { color: #1d6b51; }
  .timer-clock.paused  { color: #b18913; }
  .timer-state {
    font-size: 10px; letter-spacing: 0.4px; text-transform: uppercase;
    color: var(--text-faint); margin-top: 3px;
  }
  .timer-clock-block { display: flex; flex-direction: column; }
  .timerbar .spacer { flex: 1; }
  .timerbar button {
    font-family: inherit; font-size: 12px; font-weight: 500;
    padding: 7px 14px; border-radius: 7px; cursor: pointer;
    border: 1px solid transparent; color: #fff; transition: all 0.12s;
  }
  .timerbar button:disabled { opacity: 0.32; cursor: not-allowed; }
  .tb-start  { background: #1d6b51; }
  .tb-start:hover:not(:disabled) { background: #185b44; }
  .tb-pause  { background: #b18913; }
  .tb-pause:hover:not(:disabled) { background: #977311; }
  .tb-stop   { background: #a33636; }
  .tb-stop:hover:not(:disabled)  { background: #8a2c2c; }
  .timerbar button.tb-manual {
    background: var(--surface-2);
    border-color: var(--gold);
    color: var(--gold);
  }
  .timerbar button.tb-manual:hover { background: var(--gold); color: #fff; }

  /* ---- Табы ---- */
  .tabs {
    display: flex; gap: 3px; flex-wrap: wrap;
    border-bottom: 2px solid var(--text);
    margin-bottom: 22px;
  }
  .tab {
    font-family: inherit; font-size: 13px; font-weight: 500;
    padding: 9px 17px; cursor: pointer;
    background: transparent; border: none; color: var(--text-faint);
    border-radius: 7px 7px 0 0; transition: all 0.12s;
  }
  .tab:hover { background: #ebe8e0; color: var(--text); }
  .tab.active { background: var(--text); color: var(--bg); }
  .tab-page { display: none; }
  .tab-page.active { display: block; animation: fade 0.2s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

  /* ---- Фильтр по сферам ---- */
  .sphere-filter {
    display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px;
  }
  .sf-btn {
    font-family: inherit; font-size: 11.5px;
    padding: 5px 12px; border-radius: 20px; cursor: pointer;
    border: 1px solid var(--line); background: var(--surface); color: var(--text-dim);
    transition: all 0.12s; display: flex; align-items: center; gap: 6px;
  }
  .sf-btn:hover { border-color: var(--gold); }
  .sf-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  .sf-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* ---- Обзор: client ---- */
  .sphere-block { margin-bottom: 30px; }
  .sphere-head {
    display: flex; align-items: center; gap: 10px;
    padding-bottom: 8px; margin-bottom: 14px;
    border-bottom: 1px solid var(--line);
  }
  .sphere-mark {
    width: 24px; height: 24px; border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0;
  }
  .sphere-head h2 { font-size: 17px; font-weight: 500; }
  .sphere-head .s-count { font-size: 11.5px; color: var(--text-faint); margin-left: auto; }

  /* ---- Сетка плиток ---- */
  .tiles { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  @media (max-width: 720px) { .tiles { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 480px) { .tiles { grid-template-columns: 1fr; } }

  .tile {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 0; cursor: pointer;
    overflow: hidden; position: relative;
    transition: transform 0.12s, box-shadow 0.12s;
    display: flex; flex-direction: column;
  }
  .tile:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
  .tile.dimmed { opacity: 0.6; }
  .tile-stripe { height: 4px; width: 100%; }
  .tile-body { padding: 13px 15px 14px; flex: 1; display: flex; flex-direction: column; }
  .tile-name {
    font-size: 14px; font-weight: 600; line-height: 1.35;
    display: flex; align-items: flex-start; gap: 6px;
  }
  .tile-key {
    font-size: 9px; letter-spacing: 0.5px; text-transform: uppercase;
    background: #f3e6c4; color: #876a26;
    padding: 2px 6px; border-radius: 10px; font-weight: 600;
    white-space: nowrap; flex-shrink: 0; margin-top: 1px;
  }
  .tile-sub { font-size: 11px; color: var(--text-faint); margin-top: 2px; }
  .tile-waiting {
    font-size: 11.5px; font-weight: 600; margin-top: 7px;
    padding: 3px 9px; border-radius: 8px; display: inline-block;
    border: 1.5px solid;
  }
  .tile-waiting.wait-me     { color: #c0640a; border-color: #e0a868; background: #fff6ec; }
  .tile-waiting.wait-client { color: #2f6394; border-color: #9cc0e0; background: #eef5fb; }
  .tile-next {
    font-size: 11.5px; color: var(--text-dim); margin-top: 7px; line-height: 1.4;
  }
  .tile-next .tile-next-label { font-weight: 600; color: var(--text); }
  .tile-due {
    font-size: 11px; font-weight: 500; margin-top: 6px;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .tile-due::before { content: '📅'; font-size: 10px; }
  .tile-due.due-ok   { color: var(--text-dim); }
  .tile-due.due-soon { color: #9a6b1f; font-weight: 600; }
  .tile-due.due-over { color: #a33636; font-weight: 600; }
  .tile-updated {
    font-size: 10.5px; color: var(--text-faint); margin-top: 6px;
  }
  .tile-stat {
    font-size: 11.5px; color: var(--text-dim);
    margin-top: 10px; padding-top: 9px;
    border-top: 1px dashed var(--line);
    display: flex; gap: 10px; flex-wrap: wrap;
  }
  .tile-stat b { color: var(--text); font-weight: 600; }
  .tile-badge {
    font-size: 9.5px; letter-spacing: 0.4px; text-transform: uppercase;
    padding: 2px 7px; border-radius: 10px; font-weight: 500;
  }
  /* Project stages — cool palette (blue / purple / indigo / grey) */
  .bg-discovery { background: #e6f0fa; color: #2f6394; }
  .bg-active    { background: #ece7f7; color: #5a45a8; }
  .bg-delivered { background: #e4e9f7; color: #3a4a99; }
  .bg-completed { background: #ebe9e3; color: #807d75; }
  /* Payment — traffic light (red / amber / green) */
  .pay-none    { background: #f7dcdc; color: #a33636; }
  .pay-partial { background: #f7e6cf; color: #9a6b1f; }
  .pay-full    { background: #e2f0ea; color: #1d6b51; }

  /* ---- Сводка сверху ---- */
  .ov-summary {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 10px; margin-bottom: 20px;
  }
  .ov-sum-card {
    background: var(--surface-2); border: 1px solid var(--line);
    border-radius: 10px; padding: 12px 14px;
    display: flex; flex-direction: column; gap: 2px;
    cursor: pointer; transition: all 0.12s;
  }
  .ov-sum-card:hover { border-color: var(--text-faint); }
  .ov-sum-card.ov-on { border-color: #d8730f; border-width: 1.5px; background: #fff3e6; }
  .ov-sum-num { font-size: 22px; font-weight: 600; color: var(--text); line-height: 1.1; }
  .ov-sum-lbl { font-size: 11.5px; color: var(--text-dim); }
  .ov-sum-card.ov-alert { background: #f9e4e4; border-color: #e8b9b9; }
  .ov-sum-card.ov-alert .ov-sum-num { color: #a33636; }
  .ov-sum-card.ov-warn { background: #f9efdc; border-color: #e8d3a6; }
  .ov-sum-card.ov-warn .ov-sum-num { color: #9a6b1f; }
  @media (max-width: 560px) {
    .ov-summary { grid-template-columns: repeat(2, 1fr); }
  }
  .ov-filter-bar {
    font-size: 12.5px; color: var(--text-dim); margin-bottom: 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .ov-filter-bar button {
    font-family: inherit; font-size: 12px; cursor: pointer;
    padding: 4px 10px; border-radius: 6px;
    border: 1px solid #d8730f; background: #fff3e6; color: #c0640a;
  }

  /* ---- Управление структурой в Обзоре ---- */
  .overview-toolbar {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .ov-mode-btn {
    font-family: inherit; font-size: 12.5px; font-weight: 600;
    padding: 8px 16px; border-radius: 8px; cursor: pointer;
    border: 1.5px solid #d8730f; background: #fff3e6; color: #c0640a;
    transition: all 0.12s;
  }
  .ov-mode-btn:hover { background: #ffe8d1; border-color: #c0640a; }
  .ov-mode-btn.on { background: #d8730f; color: #fff; border-color: #d8730f; }
  .ov-mode-btn.on { background: var(--gold); color: #fff; border-color: var(--gold); }
  .ov-hint { font-size: 11.5px; color: var(--text-faint); }

  .edit-icon-btn {
    font-family: inherit; font-size: 12px; line-height: 1;
    width: 26px; height: 26px; padding: 0;
    border-radius: 6px; cursor: pointer;
    border: 1px solid var(--line); background: var(--surface); color: var(--text-dim);
    display: inline-flex; align-items: center; justify-content: center;
    transition: all 0.12s; flex-shrink: 0;
  }
  .edit-icon-btn:hover { border-color: var(--gold); color: var(--text); }
  .edit-icon-btn.del:hover { border-color: #a33636; color: #a33636; }
  .edit-icon-btn.on-date { background: var(--gold); color: #fff; border-color: var(--gold); }
  .edit-icon-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .sphere-edit-actions { display: flex; gap: 4px; align-items: center; }

  .add-row {
    display: flex; gap: 7px; margin-top: 11px; flex-wrap: wrap;
  }
  .add-row input {
    flex: 1; min-width: 180px;
    font-family: inherit; font-size: 13px;
    padding: 8px 11px; border-radius: 7px;
    border: 1px dashed var(--line); background: var(--surface-2); color: var(--text);
  }
  .add-row input:focus { outline: none; border-style: solid; border-color: var(--gold); background: var(--surface); }
  .add-row button {
    font-family: inherit; font-size: 12px;
    padding: 8px 14px; border-radius: 7px; cursor: pointer;
    border: none; background: var(--text); color: var(--bg);
  }
  .add-sphere-row {
    margin-top: 8px;
    background: var(--surface-2); border: 1px dashed var(--line);
    border-radius: 10px; padding: 14px 16px;
  }
  .add-sphere-row .ar-title { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; font-weight: 500; }

  .tile.editing { cursor: default; }
  .tile.editing:hover { transform: none; box-shadow: none; }
  .tile-edit-bar {
    display: flex; gap: 4px; padding: 7px 10px;
    border-top: 1px dashed var(--line); background: var(--surface-2);
  }
  /* стрелки перемещения */
  .move-arrows { display: inline-flex; gap: 2px; margin-right: 4px; }
  .move-btn {
    font-family: inherit; font-size: 9px; line-height: 1;
    width: 20px; height: 20px; padding: 0;
    border-radius: 5px; cursor: pointer;
    border: 1px solid var(--line); background: var(--surface); color: var(--text-dim);
    display: inline-flex; align-items: center; justify-content: center;
    transition: all 0.12s;
  }
  .move-btn:hover:not(:disabled) { border-color: var(--gold); color: var(--text); }
  .move-btn:disabled { opacity: 0.25; cursor: not-allowed; }

  /* модалка-редактор */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(20,18,14,0.45);
    display: none; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--surface); border-radius: 14px;
    padding: 24px; max-width: 440px; width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  }
  .modal h3 { font-size: 17px; font-weight: 600; margin-bottom: 16px; }
  .modal label {
    display: block; font-size: 11px; letter-spacing: 0.4px;
    text-transform: uppercase; color: var(--text-faint); margin: 12px 0 5px;
  }
  .modal input, .modal textarea, .modal select {
    width: 100%; font-family: inherit; font-size: 13.5px;
    padding: 9px 11px; border-radius: 8px;
    border: 1px solid var(--line); background: var(--surface-2); color: var(--text);
  }
  .modal input:focus, .modal textarea:focus, .modal select:focus { outline: none; border-color: var(--gold); background: var(--surface); }
  .modal textarea { resize: vertical; min-height: 60px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  .modal-actions button {
    font-family: inherit; font-size: 13px;
    padding: 8px 16px; border-radius: 8px; cursor: pointer;
  }
  .modal-actions .btn-save { background: var(--text); color: var(--bg); border: none; }
  .modal-actions .btn-cancel { background: transparent; color: var(--text-dim); border: 1px solid var(--line); }

  /* ---- Страница проекта (overlay) ---- */
  .proj-overlay {
    position: fixed; inset: 0; z-index: 80;
    background: var(--bg); overflow-y: auto;
    display: none;
  }
  .proj-overlay.open { display: block; animation: fade 0.2s ease; }
  .proj-inner { max-width: 760px; margin: 0 auto; padding: 0 22px 80px; }

  .proj-topbar {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 22px; flex-wrap: wrap;
    position: sticky; top: 0; z-index: 5;
    margin: 0 -22px 8px;
    background: rgba(244,242,236,0.94);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border-bottom: 1px solid var(--line-soft);
  }
  .proj-back {
    font-family: inherit; font-size: 12.5px; font-weight: 500;
    padding: 7px 13px; border-radius: 7px; cursor: pointer;
    border: 1px solid var(--line); background: var(--surface); color: var(--text-dim);
    transition: all 0.12s;
  }
  .proj-back:hover { border-color: var(--gold); color: var(--text); }
  .proj-topbar .spacer { flex: 1; }
  .proj-edit-toggle {
    font-family: inherit; font-size: 13px; font-weight: 600;
    padding: 9px 20px; border-radius: 8px; cursor: pointer;
    border: 1.5px solid #d8730f; background: #fff3e6; color: #c0640a;
    transition: all 0.12s;
  }
  .proj-edit-toggle:hover { background: #ffe8d1; border-color: #c0640a; }
  .proj-edit-toggle.on { background: #d8730f; color: #fff; border-color: #d8730f; }

  .proj-head {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 12px; overflow: hidden; margin-bottom: 22px;
  }
  .proj-head-stripe { height: 5px; width: 100%; }
  .proj-head-body { padding: 18px 22px 20px; }
  .proj-head-top { display: flex; align-items: flex-start; gap: 10px; }
  .proj-sphere-tag {
    font-size: 10px; letter-spacing: 0.5px; text-transform: uppercase;
    color: #fff; padding: 3px 9px; border-radius: 11px;
    font-weight: 600; white-space: nowrap;
  }
  .proj-key-tag {
    font-size: 10px; letter-spacing: 0.5px; text-transform: uppercase;
    background: #f3e6c4; color: #876a26;
    padding: 3px 9px; border-radius: 11px; font-weight: 600; white-space: nowrap;
  }
  .proj-status-tag {
    font-size: 10px; letter-spacing: 0.5px; text-transform: uppercase;
    padding: 3px 9px; border-radius: 11px; font-weight: 600; white-space: nowrap;
  }
  .proj-title {
    font-size: 22px; font-weight: 600; line-height: 1.3;
    margin: 12px 0 4px;
  }
  .proj-goal-label {
    font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
    color: var(--gold); margin: 14px 0 5px;
  }
  .proj-goal { font-size: 14px; color: var(--text-dim); line-height: 1.6; }
  .proj-goal.empty { color: var(--text-faint); font-style: italic; }
  .proj-head-edit {
    margin-top: 14px; padding-top: 14px;
    border-top: 1px dashed var(--line);
    display: flex; gap: 7px; flex-wrap: wrap;
  }
  .proj-head-edit button {
    font-family: inherit; font-size: 12px;
    padding: 6px 12px; border-radius: 7px; cursor: pointer;
    border: 1px solid var(--line); background: var(--surface-2); color: var(--text-dim);
    transition: all 0.12s;
  }
  .proj-head-edit button:hover { border-color: var(--gold); color: var(--text); }

  /* счётчик прогресса */
  .proj-progress {
    display: flex; align-items: center; gap: 12px;
    margin: 12px 0 0; font-size: 12px; color: var(--text-dim);
  }
  .proj-progress-bar {
    flex: 1; height: 7px; border-radius: 4px;
    background: var(--line-soft); overflow: hidden; min-width: 80px;
  }
  .proj-progress-fill { height: 100%; border-radius: 4px; transition: width 0.25s; }

  /* секция задач */
  .tasks-section-head {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 6px;
  }
  .tasks-section-head h3 { font-size: 15px; font-weight: 600; }
  .tasks-section-head .t-count { font-size: 11.5px; color: var(--text-faint); }
  .tasks-section-hint { font-size: 11.5px; color: var(--text-faint); margin-bottom: 14px; }

  /* группа задач по типу */
  .task-group { margin-bottom: 20px; }
  .task-group-label {
    font-size: 10.5px; letter-spacing: 0.6px; text-transform: uppercase;
    font-weight: 600; margin-bottom: 8px;
    display: flex; align-items: center; gap: 7px;
  }
  .tg-dot { width: 8px; height: 8px; border-radius: 3px; flex-shrink: 0; }
  .tg-rep   { color: #1d6b51; } .tg-rep   .tg-dot { background: #1d6b51; }
  .tg-once  { color: #45528f; } .tg-once  .tg-dot { background: #45528f; }
  .tg-cond  { color: #9a7b30; } .tg-cond  .tg-dot { background: #9a7b30; }
  .tg-back  { color: #a33636; } .tg-back  .tg-dot { background: #a33636; }
  .tg-none  { color: var(--text-faint); } .tg-none .tg-dot { background: var(--text-faint); }

  /* карточка задачи */
  .task-card {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 10px; margin-bottom: 8px; overflow: hidden;
  }
  .task-card.t-done { opacity: 0.6; }
  .task-main {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 11px 13px;
  }
  .task-check {

  /* ---- Таб «День” ---- */

    background: var(--surface); border: 1px solid var(--line);
    border-radius: 10px; padding: 9px 14px; margin-bottom: 16px;

    font-family: inherit; font-size: 15px; line-height: 1;

  .day-today-btn {

  }
  .day-summary b { color: var(--text); }
  .day-summary .ds-done { color: #1d6b51; }

  /* группа приоритета */
  .day-group { margin-bottom: 18px; }
  .day-group-label {
    font-size: 11px; letter-spacing: 0.5px; text-transform: uppercase;
    font-weight: 600; margin-bottom: 8px;
    display: flex; align-items: center; gap: 7px;
  }
  .dg-crit { color: #a33636; }
  .dg-imp  { color: #9a7b30; }
  .dg-norm { color: var(--text-dim); }
  .dg-done { color: #1d6b51; }

  /* карточка дела дня */
  .day-task {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 10px; margin-bottom: 8px; overflow: hidden;
  }
  .day-task.dt-done { opacity: 0.62; }
  .day-task-main {
    display: flex; align-items: flex-start; gap: 11px;
    padding: 12px 13px;
  }
  .day-check {
    width: 22px; height: 22px; border-radius: 7px; flex-shrink: 0;
    border: 2px solid var(--line); background: var(--surface-2);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 13px; color: #fff; transition: all 0.12s; margin-top: 1px;
  }
  .day-check:hover { border-color: var(--gold); }
  .day-check.checked { background: #1d6b51; border-color: #1d6b51; }
  .day-task-body { flex: 1; min-width: 0; }
  .day-task-top { display: flex; align-items: baseline; gap: 7px; flex-wrap: wrap; }
  .day-task-name { font-size: 14px; line-height: 1.4; font-weight: 500; }
  .day-task.dt-done .day-task-name { text-decoration: line-through; font-weight: 400; }
  .day-task-time {
    font-size: 11.5px; font-weight: 600; color: #6f5a22;
    background: #e9e3d2; padding: 1px 7px; border-radius: 8px;
    white-space: nowrap;
  }
  .day-task-meta {
    display: flex; align-items: center; gap: 7px; flex-wrap: wrap;
    margin-top: 4px;
  }
  .day-proj-tag {
    font-size: 10.5px; color: #fff; padding: 2px 8px; border-radius: 9px;
    font-weight: 500; white-space: nowrap;
  }
  .day-rep-tag {
    font-size: 10px; letter-spacing: 0.3px;
    background: #dceee6; color: #1d6b51;
    padding: 2px 7px; border-radius: 9px; font-weight: 600;
  }
  .day-task-hint {
    font-size: 11px; color: var(--text-faint); font-style: italic;
    margin-top: 3px;
  }
  .day-subs-line {
    font-size: 11px; color: var(--text-dim); margin-top: 4px;
    cursor: pointer; user-select: none; display: inline-flex; align-items: center;
  }
  .day-subs-line:hover { color: var(--text); }
  .day-subs-line .dsl-arrow {
    font-size: 8px; margin-right: 4px; transition: transform 0.15s; display: inline-block;
  }
  .day-subs-line.open .dsl-arrow { transform: rotate(90deg); }
  .day-subs-line .dsl-bar {
    display: inline-block; width: 46px; height: 5px; border-radius: 3px;
    background: var(--line-soft); vertical-align: middle; margin: 0 5px;
    overflow: hidden;
  }
  .day-subs-line .dsl-fill {
    display: block; height: 100%; background: #1d6b51; border-radius: 3px;
  }
  .day-subs-wrap {
    margin: 5px 0 2px; padding-left: 2px;
    display: flex; flex-direction: column; gap: 4px;
  }

  /* действия дела */
  .day-task-actions {
    display: flex; gap: 5px; padding: 7px 11px;
    border-top: 1px dashed var(--line); background: var(--surface-2);
    align-items: center; flex-wrap: wrap;
  }
  .day-act-btn {
    font-family: inherit; font-size: 11px;
    padding: 5px 10px; border-radius: 6px; cursor: pointer;
    border: 1px solid var(--line); background: var(--surface); color: var(--text-dim);
    transition: all 0.12s;
  }
  .day-act-btn:hover { border-color: var(--gold); color: var(--text); }
  .day-act-btn.move:hover { border-color: #45528f; color: #45528f; }
  .day-act-btn .ab-ico { margin-right: 3px; }
  .day-act-btn.arrow {
    padding: 5px 8px; min-width: 26px; text-align: center;
  }
  .day-act-btn.arrow:hover:not(:disabled) { border-color: #45528f; color: #45528f; }
  .day-task-actions .da-spacer { flex: 1; }
  .day-act-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .day-empty {
    text-align: center; padding: 50px 20px;
    color: var(--text-faint); font-size: 13.5px;
  }
  .day-empty .big { font-size: 32px; margin-bottom: 12px; }
  .day-alldone {
    text-align: center; padding: 22px 18px; margin-bottom: 16px;
    background: #f0f5f1; border: 1px solid #cfe3d6;
    border-radius: 11px; color: #1d6b51; font-size: 13.5px;
  }
  .day-alldone .big { font-size: 26px; margin-bottom: 6px; }

  /* модалка переноса */
  .move-modal-row {
    display: flex; gap: 9px; flex-wrap: wrap; margin: 12px 0;
  }
  .move-modal-row label {
    font-size: 11px; letter-spacing: 0.4px; text-transform: uppercase;
    color: var(--text-faint); display: block; margin-bottom: 4px;
  }
  .move-modal-row input {
    font-family: inherit; font-size: 13px;
    padding: 8px 10px; border-radius: 7px;
    border: 1px solid var(--line); background: var(--surface-2); color: var(--text);
  }
  .move-modal-row input:focus { outline: none; border-color: var(--gold); }
  .move-quick {
    display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 4px;
  }
  .move-quick button {
    font-family: inherit; font-size: 11.5px;
    padding: 6px 11px; border-radius: 7px; cursor: pointer;
    border: 1px solid var(--line); background: var(--surface-2); color: var(--text-dim);
    transition: all 0.12s;
  }
  .move-quick button:hover { border-color: var(--gold); color: var(--text); }

  /* ---- Таб «Неделя” ---- */
  .week-nav {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 10px; padding: 9px 14px; margin-bottom: 18px;
  }
  .week-nav-btn {
    font-family: inherit; font-size: 15px; line-height: 1;
    width: 32px; height: 32px; padding: 0;
    border-radius: 7px; cursor: pointer;
    border: 1px solid var(--line); background: var(--surface-2); color: var(--text-dim);
    display: inline-flex; align-items: center; justify-content: center;
    transition: all 0.12s; flex-shrink: 0;
  }
  .week-nav-btn:hover { border-color: var(--gold); color: var(--text); }
  .week-nav-label { flex: 1; text-align: center; }
  .week-nav-label .wn-range { font-size: 14.5px; font-weight: 600; }
  .week-nav-label .wn-sub { font-size: 11px; color: var(--text-faint); margin-top: 1px; }
  .week-today-btn {
    font-family: inherit; font-size: 11.5px;
    padding: 6px 11px; border-radius: 7px; cursor: pointer;
    border: 1px solid var(--line); background: var(--surface-2); color: var(--text-dim);
    transition: all 0.12s; flex-shrink: 0;
  }
  .week-today-btn:hover { border-color: var(--gold); color: var(--text); }
  .week-today-btn.hidden { visibility: hidden; }

  .week-summary {
    font-size: 12px; color: var(--text-dim);
    margin-bottom: 16px; display: flex; gap: 14px; flex-wrap: wrap;
  }
  .week-summary b { color: var(--text); }
  .week-summary .ws-crit { color: #a33636; }

  .week-toolbar {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    margin-bottom: 14px;
  }

  /* стрелки перестановки плитки недели */
  .week-tile-order {
    display: flex; gap: 5px; padding: 7px 14px 10px;
    border-top: 1px dashed var(--line-soft); background: var(--surface-2);
  }
  .week-tile-order .move-btn { width: 26px; height: 24px; font-size: 11px; }
  .week-tile-order .wto-label {
    flex: 1; font-size: 10.5px; color: var(--text-faint);
    display: flex; align-items: center;
  }
  .week-tile.ordering { cursor: default; }
  .week-tile.ordering:hover { transform: none; box-shadow: none; }

  /* плитки недели */
  .week-tiles { display: grid; grid-template-columns: repeat(2, 1fr); gap: 13px; }
  @media (max-width: 640px) { .week-tiles { grid-template-columns: 1fr; } }

  .week-tile {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 11px; overflow: hidden; cursor: pointer;
    transition: transform 0.12s, box-shadow 0.12s;

  }
  .week-tile:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
  .week-tile-stripe { height: 4px; width: 100%; }
  .week-tile-head {
    display: flex; align-items: flex-start; gap: 7px;
    padding: 12px 14px 8px;
  }
  .week-tile-head .wt-mark {
    width: 20px; height: 20px; border-radius: 6px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; color: #fff;
  }
  .week-tile-titles { flex: 1; min-width: 0; }
  .week-tile-name { font-size: 13.5px; font-weight: 600; line-height: 1.3; }
  .week-tile-sub { font-size: 10.5px; color: var(--text-faint); margin-top: 1px; }
  .week-tile-keytag {
    font-size: 8.5px; letter-spacing: 0.4px; text-transform: uppercase;
    background: #f3e6c4; color: #876a26;
    padding: 2px 6px; border-radius: 9px; font-weight: 600;
    white-space: nowrap; flex-shrink: 0;
  }

  .week-task-list { padding: 2px 14px 6px; }
  .week-task {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 6px 0; border-top: 1px dashed var(--line-soft);
  }
  .week-task:first-child { border-top: none; }
  .week-task-icon { font-size: 11px; flex-shrink: 0; margin-top: 2px; }
  .week-task-body { flex: 1; min-width: 0; }
  .week-task-name { font-size: 12.5px; line-height: 1.4; }
  .week-task-when {
    font-size: 10.5px; color: var(--text-faint); margin-top: 1px;
  }
  .week-task-when .wtw-day {
    font-weight: 600; color: var(--text-dim);
  }
  .week-task-when .wtw-today { color: #1d6b51; }
  .week-task-when .wtw-over { color: #a33636; }

  .week-tile-more {
    font-size: 11px; color: var(--text-faint);
    padding: 7px 14px 11px; border-top: 1px dashed var(--line-soft);
    margin-top: 2px;
  }
  .week-rep-line {
    font-size: 11px; color: #1d6b51;
    padding: 8px 14px 11px;
    border-top: 1px dashed var(--line-soft);
    background: #f3f7f5;
  }
  .week-rep-line b { font-weight: 600; }

  .week-empty {
    text-align: center; padding: 50px 20px;
    color: var(--text-faint); font-size: 13.5px;
  }
  .week-empty .big { font-size: 32px; margin-bottom: 12px; }

  /* ---- Заглушка для будущих табов ---- */
  .stub {
    text-align: center; padding: 60px 20px;
    color: var(--text-faint); font-size: 14px;
  }
  .stub .big { font-size: 30px; margin-bottom: 10px; }

  footer {
    text-align: center; font-size: 11.5px; color: var(--text-faint);
    margin-top: 36px; padding-top: 16px; border-top: 1px solid var(--line);
  }
  footer a {
    color: var(--gold); text-decoration: none;
  }
  footer a:hover { text-decoration: underline; }

<script>
// ===== Всплывающее уведомление (мягкая подсказка пользователю) =====
let noticeTimer = null;
function showErrorBar(msg) {
  let bar = document.getElementById('app-notice');
  if (!bar) {
    bar = document.createElement('div');
    bar.id = 'app-notice';
    bar.style.cssText = 'position:fixed;left:50%;bottom:24px;transform:translateX(-50%);' +
      'z-index:9999;background:#3a3733;color:#fff;' +
      'font:13px/1.45 system-ui,-apple-system,sans-serif;' +
      'padding:11px 18px;border-radius:9px;max-width:90%;' +
      'box-shadow:0 6px 22px rgba(0,0,0,0.28);text-align:center;';
    if (document.body) document.body.appendChild(bar);
    else document.addEventListener('DOMContentLoaded', function () {
      if (!document.getElementById('app-notice')) document.body.appendChild(bar);
    });
  }
  bar.textContent = String(msg);
  bar.style.display = 'block';
  if (noticeTimer) clearTimeout(noticeTimer);
  noticeTimer = setTimeout(function () {
    const b = document.getElementById('app-notice');
    if (b) b.style.display = 'none';
  }, 4000);
}


// генератор коротких уникальных id (объявлен до T() — используется при создании задач)
function genId() {
  return 't' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

// Project stages: id, label, CSS badge class, whether the project is "closed" (dimmed)
const STAGES = [
  { id: 'discovery', label: 'Discovery',   cls: 'bg-discovery', closed: false },
  { id: 'progress',  label: 'In Progress', cls: 'bg-active',    closed: false },
  { id: 'delivered', label: 'Delivered',   cls: 'bg-delivered', closed: false },
  { id: 'completed', label: 'Completed',   cls: 'bg-completed', closed: true  }
];
const STAGE_IDS = STAGES.map(function (s) { return s.id; });

// Payment status
const PAYMENTS = [
  { id: 'none',    label: 'Not paid' },
  { id: 'partial', label: 'Partly paid' },
  { id: 'full',    label: 'Paid in full' }
];
const PAYMENT_IDS = PAYMENTS.map(function (p) { return p.id; });
function paymentOf(id) {
  return PAYMENTS.find(function (p) { return p.id === id; }) || PAYMENTS[0];
}
function stageOf(id) {
  return STAGES.find(function (s) { return s.id === id; }) || STAGES[1];
}

// Сферы: id, имя, короткая подпись, цвет
const STARTER_SPHERES = [
  { id: 'A', name: 'Acme Studios',     tag: 'client', color: '#45528f' },
  { id: 'B', name: 'Bright Coffee Co', tag: 'client', color: '#1d6b51' },
  { id: 'C', name: 'Nova Fitness',     tag: 'client', color: '#9a3a5a' }
];

// Task type: 'rep' повторяющаяся, 'once' one-off, 'back' backlog, 'cond' conditional, '' не выбран
// Каждая задача: { name, type, hint, date, time, rhythm, priority, subs:[{name,done}] }
//   date    — 'YYYY-MM-DD' или '' (для разовых задач — день в плане)
//   time    — 'HH:MM' или '' (по желанию)
//   rhythm  — для повторяющихся: 'daily' (каждый день) или ''
//   priority— 'crit' critical / 'imp' important / 'norm' normal (по умолчанию)
// Project: { sphere, num, title, short, goal, isKey, status, waiting, nextAction, tasks:[] }
//   waiting    — 'me' (waiting on me) / 'client' (waiting on client) / '' (no block)
//   nextAction — short text: the next concrete step
//   payment    — 'none' / 'partial' / 'full'
//   dueDate    — 'YYYY-MM-DD' or '' (project deadline)
//   updatedAt  — timestamp (ms) of last change, auto
function T(name, opts) {
  opts = opts || {};
  return { tid: genId(),
           name: name, type: opts.type || '', hint: opts.hint || '',
           date: opts.date || '', time: opts.time || '',
           rhythm: opts.type === 'rep' ? 'daily' : (opts.rhythm || ''),
           priority: opts.priority || 'norm',
           subs: (opts.subs || []).map(function(s){ return { name: s, done: false }; }) };
}

const STARTER_PROJECTS = [
  // ===== Acme Studios =====
  { sphere:'A', num:1, title:'Website redesign', short:'Website redesign', isKey:true, status:'progress', payment:'partial', dueDate:'2026-06-05',
    waiting:'me', nextAction:'Finish the homepage mockup',
    goal:'Full redesign of the marketing site, 5 pages.',
    tasks:[
      T('Design homepage mockup'),
      T('Build responsive layout'),
      T('Send first draft for review')
    ]},
  { sphere:'A', num:2, title:'Brand guidelines doc', short:'Brand guidelines', isKey:false, status:'progress', payment:'none', dueDate:'2026-05-28',
    waiting:'client', nextAction:'Chase client for logo files',
    goal:'One-page brand guide: colours, fonts, logo usage.',
    tasks:[
      T('Draft colour palette'),
      T('Waiting on client logo files')
    ]},
  // ===== Bright Coffee Co =====
  { sphere:'B', num:3, title:'Instagram content pack', short:'Instagram content', isKey:false, status:'progress', payment:'partial', dueDate:'2026-06-12',
    waiting:'client', nextAction:'Wait for approval on 12 posts',
    goal:'12 social posts for the spring campaign.',
    tasks:[
      T('Write captions'),
      T('Design 12 post graphics'),
      T('Submit for client approval')
    ]},
  { sphere:'B', num:4, title:'Menu print design', short:'Menu print design', isKey:false, status:'delivered', payment:'none', dueDate:'',
    waiting:'me', nextAction:'Send the invoice',
    goal:'New in-store menu, print-ready PDF.',
    tasks:[
      T('Final layout exported'),
      T('Sent print-ready files')
    ]},
  // ===== Nova Fitness =====
  { sphere:'C', num:5, title:'Landing page copy', short:'Landing page copy', isKey:false, status:'discovery', payment:'none', dueDate:'2026-06-20',
    waiting:'me', nextAction:'Book the discovery call',
    goal:'Sales copy for the new membership landing page.',
    tasks:[
      T('Run discovery call'),
      T('Gather product details')
    ]},
  { sphere:'C', num:6, title:'Logo refresh', short:'Logo refresh', isKey:false, status:'completed', payment:'full', dueDate:'',
    waiting:'', nextAction:'',
    goal:'Updated logo in 3 formats.',
    tasks:[
      T('Delivered final files'),
      T('Invoice paid')
    ]}
];

</script>
<script>
// ===== СОСТОЯНИЕ =====
const STORAGE_KEY = 'multiClientDashboard_v1';
let state = null;

function defaultState() {
  return {
    appKicker: 'Freelance',
    appTitle: 'Multi-Client Dashboard',
    spheres: JSON.parse(JSON.stringify(STARTER_SPHERES)),
    projects: JSON.parse(JSON.stringify(STARTER_PROJECTS)),
    log: [],                 // записи учёта времени
    dayLog: [],              // выполненные дела дня: {date, projectNum, taskName, ...}
    dayPlan: {},             // правки плана по dateм: { 'YYYY-MM-DD': {order:[], removed:[], moved:{}} }
    weekOrder: [],           // свой порядок плиток в табе «Неделя” (номера проектов)
    timer: { running: false, startedAt: null, accumMs: 0 },
    lastTab: 'overview',
    sphereFilter: 'all'
  };
}

// приводим задачу к актуальной схеме (миграция старых сохранений)
function normalizeTask(t) {
  if (typeof t.date !== 'string') t.date = '';
  if (typeof t.time !== 'string') t.time = '';
  if (typeof t.rhythm !== 'string') t.rhythm = (t.type === 'rep' ? 'daily' : '');
  if (['crit','imp','norm'].indexOf(t.priority) === -1) t.priority = 'norm';
  if (!Array.isArray(t.subs)) t.subs = [];
  if (!t.tid) t.tid = genId();
  delete t.done;   // выполнение задачи больше не живёт на странице проекта
  return t;
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      state = JSON.parse(raw);
      if (!state.spheres)  state.spheres  = JSON.parse(JSON.stringify(STARTER_SPHERES));
      if (!state.projects) state.projects = JSON.parse(JSON.stringify(STARTER_PROJECTS));
      if (!state.log)      state.log = [];
      if (!state.dayLog)   state.dayLog = [];
      if (!state.dayPlan)  state.dayPlan = {};
      if (!Array.isArray(state.weekOrder)) state.weekOrder = [];
      if (typeof state.appKicker !== 'string') state.appKicker = 'Freelance';
      if (typeof state.appTitle !== 'string') state.appTitle = 'Multi-Client Dashboard';
      if (!state.timer)    state.timer = { running: false, startedAt: null, accumMs: 0 };
      if (!state.sphereFilter) state.sphereFilter = 'all';
      // миграция: дотягиваем задачи до новой схемы
      state.projects.forEach(function (p) {
        if (typeof p.waiting !== 'string') p.waiting = '';
        if (typeof p.nextAction !== 'string') p.nextAction = '';
        if (typeof p.payment !== 'string') p.payment = 'none';
        if (typeof p.dueDate !== 'string') p.dueDate = '';
        if (typeof p.updatedAt !== 'number') p.updatedAt = 0;
        // миграция старых стадий в новый набор (discovery/progress/delivered/completed)
        if (p.status === 'active' || p.status === 'review' || p.status === 'waiting') p.status = 'progress';
        if (p.status === 'paid') { p.status = 'delivered'; p.payment = 'full'; }
        if (STAGE_IDS.indexOf(p.status) === -1) p.status = 'progress';
        if (PAYMENT_IDS.indexOf(p.payment) === -1) p.payment = 'none';
        if (Array.isArray(p.tasks)) p.tasks.forEach(normalizeTask);
      });
    } else {
      state = defaultState();
    }
  } catch (e) {
    console.error('Load error:', e);
    state = defaultState();
  }
}

let saveTimer = null;
function saveState(immediate) {
  setSaveStatus('Saving…', true);
  if (saveTimer) clearTimeout(saveTimer);
  const doSave = function () {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      setSaveStatus('Saved', false);
    } catch (e) {
      setSaveStatus('Save error', true);
      console.error(e);
    }
  };
  if (immediate) doSave();
  else saveTimer = setTimeout(doSave, 400);
}

function setSaveStatus(text, unsaved) {
  const el = document.getElementById('save-status');
  if (!el) return;
  el.textContent = text;
  el.classList.toggle('unsaved', !!unsaved);
}

// ===== ТАБЫ =====
function showTab(name) {
  document.querySelectorAll('.tab-page').forEach(function (p) { p.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function (t) { t.classList.remove('active'); });
  const page = document.getElementById('page-' + name);
  const tab  = document.querySelector('.tab[data-tab="' + name + '"]');
  if (page) page.classList.add('active');
  if (tab)  tab.classList.add('active');
  if (name === 'week') renderWeek();
  if (name === 'day') renderDay();
  if (name === 'calendar') renderCalendar();
  if (name === 'time') renderTimeLog();
  state.lastTab = name;
  saveState();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ===== ВСПОМОГАТЕЛЬНОЕ =====
function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function sphereById(id) {
  return state.spheres.find(function (s) { return s.id === id; });
}
function plural(n, one, few, many) {
  const m10 = n % 10, m100 = n % 100;
  if (m10 === 1 && m100 !== 11) return one;
  if (m10 >= 2 && m10 <= 4 && (m100 < 10 || m100 >= 20)) return few;
  return many;
}
function projectStats(p) {
  let typed = 0, subs = 0, subsDone = 0;
  p.tasks.forEach(function (t) {
    if (t.type) typed++;
    if (t.subs) { subs += t.subs.length; subsDone += t.subs.filter(function (s){return s.done;}).length; }
  });
  return { total: p.tasks.length, typed: typed, subs: subs, subsDone: subsDone };
}

// ===== ТАЙМЕР (сквозной) =====
function timerLiveMs() {
  let ms = state.timer.accumMs;
  if (state.timer.running && state.timer.startedAt) {
    ms += Date.now() - state.timer.startedAt;
  }
  return ms;
}
function fmtClock(ms) {
  const total = Math.floor(ms / 1000);
  const h = Math.floor(total / 3600);
  const m = Math.floor((total % 3600) / 60);
  const s = total % 60;
  return h + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}
function timerStart() {
  if (state.timer.running) return;
  state.timer.running = true;
  state.timer.startedAt = Date.now();
  saveState();
  renderTimer();
  startTicker();
}
function timerPause() {
  if (!state.timer.running) return;
  state.timer.accumMs += Date.now() - state.timer.startedAt;
  state.timer.running = false;
  state.timer.startedAt = null;
  saveState();
  renderTimer();
}
function timerStop() {
  // фиксируем накопленное и открываем окно записи
  if (state.timer.running) {
    state.timer.accumMs += Date.now() - state.timer.startedAt;
    state.timer.running = false;
    state.timer.startedAt = null;
  }
  const ms = state.timer.accumMs;
  saveState();
  renderTimer();
  if (ms < 1000) { resetTimer(); return; }   // ничего не насчитано
  openStopEntry(ms);
}
function resetTimer() {
  state.timer = { running: false, startedAt: null, accumMs: 0 };
  saveState();
  renderTimer();
}
// ===== ШАПКА (редактируемые названия) =====
function renderHeader() {
  const k = document.getElementById('app-kicker');
  const t = document.getElementById('app-title');
  if (k) k.textContent = state.appKicker || 'Freelance';
  if (t) t.textContent = state.appTitle || 'Multi-Client Dashboard';
}
function editHeader() {
  openModal('Dashboard name', [
    { key: 'kicker', label: 'Kicker (small text above)', value: state.appKicker || '' },
    { key: 'title',  label: 'Title', value: state.appTitle || '' }
  ], function (vals) {
    state.appKicker = vals.kicker.trim() || 'Freelance';
    state.appTitle  = vals.title.trim()  || 'Multi-Client Dashboard';
    saveState(true);
    renderHeader();
  });
}

function renderTimer() {
  const clock = document.getElementById('timer-clock');
  const stateEl = document.getElementById('timer-state');
  const bStart = document.getElementById('tb-start');
  const bPause = document.getElementById('tb-pause');
  const bStop  = document.getElementById('tb-stop');
  if (!clock) return;
  clock.textContent = fmtClock(timerLiveMs());
  clock.classList.toggle('running', state.timer.running);
  clock.classList.toggle('paused', !state.timer.running && state.timer.accumMs > 0);
  if (state.timer.running) {
    stateEl.textContent = 'running';
    bStart.disabled = true; bPause.disabled = false; bStop.disabled = false;
  } else if (state.timer.accumMs > 0) {
    stateEl.textContent = 'paused';
    bStart.disabled = false; bPause.disabled = true; bStop.disabled = false;
  } else {
    stateEl.textContent = 'stopped';
    bStart.disabled = false; bPause.disabled = true; bStop.disabled = true;
  }
}
let ticker = null;
function startTicker() {
  if (ticker) return;
  ticker = setInterval(function () {
    if (!state.timer.running) { clearInterval(ticker); ticker = null; return; }
    const clock = document.getElementById('timer-clock');
    if (clock) clock.textContent = fmtClock(timerLiveMs());
  }, 1000);
}

// ===== ОКНО ЗАПИСИ ВРЕМЕНИ =====
// Запись лога: { id, date, minutes, projectNum, taskTid, taskName, note, createdAt }

// окно после остановки таймера (время уже насчитано)
function openStopEntry(ms) {
  const minutes = Math.max(1, Math.round(ms / 60000));
  openTimeEntryModal({
    mode: 'stop',
    minutes: minutes,
    fixedDuration: true,           // длительность с таймера — не редактируется
    date: todayISO(),
    onSaved: function () { resetTimer(); },
    onCancel: function () { resetTimer(); }
  });
}

// окно ручного ввода (с нуля)
function openManualEntry() {
  openTimeEntryModal({
    mode: 'manual',
    minutes: 30,
    fixedDuration: false,
    date: todayISO()
  });
}

// окно редактирования существующей записи
function openTimeEntryEdit(id) {
  const rec = state.log.find(function (r) { return r.id === id; });
  if (!rec) return;
  openTimeEntryModal({
    mode: 'edit',
    editId: id,
    minutes: rec.minutes,
    fixedDuration: false,
    date: rec.date,
    projectNum: rec.projectNum,
    taskTid: rec.taskTid,
    note: rec.note
  });
}

// универсальное окно записи времени
function openTimeEntryModal(opts) {
  opts = opts || {};
  const minutes = opts.minutes || 30;
  const h = Math.floor(minutes / 60), m = minutes % 60;

  // список проектов (активные + backlog, без paused), сгруппированы по сферам
  let projOpts = '<option value="">— select project —</option>';
  state.spheres.forEach(function (s) {
    const inSphere = state.projects.filter(function (p) {
      return p.sphere === s.id && p.status !== 'paused';
    });
    if (!inSphere.length) return;
    projOpts += '<optgroup label="' + escapeHtml(s.id + ' · ' + s.name) + '">';
    inSphere.forEach(function (p) {
      projOpts += '<option value="' + p.num + '"' +
        (opts.projectNum === p.num ? ' selected' : '') + '>' +
        escapeHtml(p.short) + '</option>';
    });
    projOpts += '</optgroup>';
  });

  let durHtml;
  if (opts.fixedDuration) {
    durHtml = '<div class="te-dur-display">Tracked by timer: <b>' +
      (h > 0 ? h + 'h ' : '') + m + 'min</b></div>';
  } else {
    durHtml = '<div class="te-modal-row">' +
      '<div class="te-modal-field"><label>Hours</label>' +
        '<input type="number" id="te-hours" min="0" max="24" value="' + h + '"></div>' +
      '<div class="te-modal-field"><label>Minutes</label>' +
        '<input type="number" id="te-mins" min="0" max="59" value="' + m + '"></div>' +
      '</div>';
  }

  const titleMap = { stop: 'Time entry', manual: 'Add time manually', edit: 'Edit entry' };
  const bodyHtml =
    durHtml +
    '<div class="te-modal-field"><label>Date</label>' +
      '<input type="date" id="te-date" value="' + escapeHtml(opts.date || todayISO()) + '"></div>' +
    '<div class="te-modal-field"><label>Project</label>' +
      '<select id="te-project" onchange="teRefreshTasks()">' + projOpts + '</select></div>' +
    '<div class="te-modal-field"><label>Task (optional)</label>' +
      '<select id="te-task"><option value="">— whole project —</option></select></div>' +
    '<div class="te-modal-field"><label>Description (optional)</label>' +
      '<textarea id="te-note" placeholder="What you worked on">' +
      escapeHtml(opts.note || '') + '</textarea></div>';

  openCustomModal(titleMap[opts.mode] || 'Time entry', bodyHtml, [
    { label: 'Cancel', kind: 'ghost', action: function () {
        closeModal();
        if (opts.onCancel) opts.onCancel();
      } },
    { label: opts.mode === 'edit' ? 'Save' : 'Add', kind: 'primary',
      action: function () { saveTimeEntry(opts); } }
  ]);

  // заполнить задачи выбранного проекта
  teRefreshTasks(opts.taskTid);
}

// обновляет список задач при выборе проекта
function teRefreshTasks(preselectTid) {
  const projSel = document.getElementById('te-project');
  const taskSel = document.getElementById('te-task');
  if (!projSel || !taskSel) return;
  const pnum = parseInt(projSel.value, 10);
  let opts = '<option value="">— whole project —</option>';
  const p = state.projects.find(function (x) { return x.num === pnum; });
  if (p) {
    (p.tasks || []).forEach(function (t) {
      normalizeTask(t);
      opts += '<option value="' + t.tid + '"' +
        (preselectTid === t.tid ? ' selected' : '') + '>' +
        escapeHtml(t.name) + '</option>';
    });
  }
  taskSel.innerHTML = opts;
}

function saveTimeEntry(opts) {
  // длительность
  let minutes;
  if (opts.fixedDuration) {
    minutes = opts.minutes;
  } else {
    const hEl = document.getElementById('te-hours');
    const mEl = document.getElementById('te-mins');
    const hh = Math.max(0, parseInt(hEl ? hEl.value : '0', 10) || 0);
    const mm = Math.max(0, parseInt(mEl ? mEl.value : '0', 10) || 0);
    minutes = hh * 60 + mm;
  }
  if (!minutes || minutes < 1) {
    showErrorBar('Enter a duration greater than zero.');
    return;
  }
  const dateEl = document.getElementById('te-date');
  const projEl = document.getElementById('te-project');
  const taskEl = document.getElementById('te-task');
  const noteEl = document.getElementById('te-note');

  const date = dateEl ? dateEl.value : todayISO();
  const projectNum = projEl && projEl.value ? parseInt(projEl.value, 10) : null;
  if (!projectNum) {
    showErrorBar('Select a project to log the time to.');
    return;
  }
  const taskTid = taskEl && taskEl.value ? taskEl.value : '';
  let taskName = '';
  if (taskTid) {
    const found = findTaskByTid(taskTid);
    if (found) taskName = found.task.name;
  }
  const note = noteEl ? noteEl.value.trim() : '';

  if (opts.mode === 'edit' && opts.editId) {
    const rec = state.log.find(function (r) { return r.id === opts.editId; });
    if (rec) {
      rec.date = date; rec.minutes = minutes;
      rec.projectNum = projectNum; rec.taskTid = taskTid;
      rec.taskName = taskName; rec.note = note;
    }
  } else {
    state.log.push({
      id: genId(),
      date: date,
      minutes: minutes,
      projectNum: projectNum,
      taskTid: taskTid,
      taskName: taskName,
      note: note,
      createdAt: Date.now()
    });
  }

  closeModal();
  saveState(true);
  if (opts.onSaved) opts.onSaved();   // для stop — сброс таймера
  renderTimeLog();
}

// ===== ОБЗОР =====
let editMode = false;
let summaryFilter = 'all';   // all / waitMe / waitClient / overdue / unpaid
function setSummaryFilter(f) {
  summaryFilter = (summaryFilter === f) ? 'all' : f;
  renderOverview();
}
function projMatchesSummary(p) {
  if (summaryFilter === 'all') return true;
  if (summaryFilter === 'waitMe')     return p.waiting === 'me' && !stageOf(p.status).closed;
  if (summaryFilter === 'waitClient') return p.waiting === 'client' && !stageOf(p.status).closed;
  if (summaryFilter === 'overdue')    return isOverdue(p);
  if (summaryFilter === 'unpaid')     return p.payment === 'none' && !stageOf(p.status).closed;
  return true;
}

function toggleEditMode() {
  editMode = !editMode;
  const btn = document.getElementById('ov-mode-btn');
  const hint = document.getElementById('ov-hint');
  btn.classList.toggle('on', editMode);
  btn.textContent = editMode ? '✓ Done' : '✎ Edit structure';
  hint.textContent = editMode
    ? 'Rename, add, delete, move with ▲▼'
    : '';
  renderOverview();
}

function renderSphereFilter() {
  const box = document.getElementById('sphere-filter');
  let html = '<button class="sf-btn ' + (state.sphereFilter === 'all' ? 'active' : '') +
             '" onclick="setSphereFilter(\'all\')">All clients</button>';
  state.spheres.forEach(function (s) {
    html += '<button class="sf-btn ' + (state.sphereFilter === s.id ? 'active' : '') +
            '" onclick="setSphereFilter(\'' + s.id + '\')">' +
            '<span class="sf-dot" style="background:' + s.color + '"></span>' +
            escapeHtml(s.id + ' · ' + s.name) + '</button>';
  });
  box.innerHTML = html;
}
function setSphereFilter(id) {
  state.sphereFilter = id;
  saveState();
  renderSphereFilter();
  renderOverview();
}

function renderOverview() {
  const body = document.getElementById('overview-body');
  let html = '';

  // ----- сводка сверху -----
  if (!editMode) {
    const all = state.projects.filter(function (p) { return !stageOf(p.status).closed; });
    const waitMe     = all.filter(function (p) { return p.waiting === 'me'; }).length;
    const waitClient = all.filter(function (p) { return p.waiting === 'client'; }).length;
    const overdue    = state.projects.filter(isOverdue).length;
    const unpaid     = all.filter(function (p) { return p.payment === 'none'; }).length;
    function card(f, num, lbl, extra) {
      const on = summaryFilter === f ? ' ov-on' : '';
      return '<div class="ov-sum-card' + (extra || '') + on + '" onclick="setSummaryFilter(\'' + f + '\')">' +
        '<span class="ov-sum-num">' + num + '</span><span class="ov-sum-lbl">' + lbl + '</span></div>';
    }
    html += '<div class="ov-summary">' +
      card('waitMe', waitMe, 'Waiting on me', '') +
      card('waitClient', waitClient, 'Waiting on client', '') +
      card('overdue', overdue, 'Overdue', overdue ? ' ov-alert' : '') +
      card('unpaid', unpaid, 'Not paid', unpaid ? ' ov-warn' : '') +
      '</div>';
    if (summaryFilter !== 'all') {
      html += '<div class="ov-filter-bar">Showing filtered projects ' +
        '<button onclick="setSummaryFilter(summaryFilter)">✕ Show all</button></div>';
    }
  }

  state.spheres.forEach(function (s, si) {
    if (state.sphereFilter !== 'all' && state.sphereFilter !== s.id) return;
    let projs = state.projects.filter(function (p) { return p.sphere === s.id; });
    // фильтр сводки (не в режиме редактирования)
    if (!editMode && summaryFilter !== 'all') {
      projs = projs.filter(projMatchesSummary);
      if (!projs.length) return;   // прячем клиента без подходящих проектов
    }

    html += '<div class="sphere-block" data-sphere="' + s.id + '">';
    html += '<div class="sphere-head">';
    if (editMode) {
      const isFirst = si === 0;
      const isLast  = si === state.spheres.length - 1;
      html += '<span class="move-arrows">' +
        '<button class="move-btn" title="Move up" ' + (isFirst ? 'disabled' : '') +
          ' onclick="moveSphere(\'' + s.id + '\',-1)">▲</button>' +
        '<button class="move-btn" title="Move down" ' + (isLast ? 'disabled' : '') +
          ' onclick="moveSphere(\'' + s.id + '\',1)">▼</button>' +
        '</span>';
    }
    html += '<div class="sphere-mark" style="background:' + s.color + '">' + s.id + '</div>' +
      '<h2>' + escapeHtml(s.name) + '</h2>';
    if (editMode) {
      html += '<div class="sphere-edit-actions">' +
        '<button class="edit-icon-btn" title="Rename client" ' +
          'onclick="editSphere(\'' + s.id + '\')">✎</button>' +
        '<button class="edit-icon-btn del" title="Delete client" ' +
          'onclick="deleteSphere(\'' + s.id + '\')">✕</button>' +
        '</div>';
    } else {
      html += '<span class="s-count">' + projs.length + ' ' +
        plural(projs.length, 'project', 'projects', 'projects') + '</span>';
    }
    html += '</div>';

    if (projs.length) {
      html += '<div class="tiles">';
      projs.forEach(function (p, pi) { html += renderTile(p, s, pi, projs.length); });
      html += '</div>';
    } else if (!editMode) {
      html += '<div class="ov-hint" style="padding:6px 2px;">No projects for this client yet.</div>';
    }

    if (editMode) {
      html += '<div class="add-row">' +
        '<input type="text" id="add-proj-' + s.id + '" placeholder="New project name" ' +
        'onkeydown="if(event.key===\'Enter\')addProject(\'' + s.id + '\')">' +
        '<button onclick="addProject(\'' + s.id + '\')">+ Project</button>' +
        '</div>';
    }
    html += '</div>';
  });

  if (!html) html = '<div class="stub">No clients to show.</div>';

  if (editMode && state.sphereFilter === 'all') {
    html += '<div class="add-sphere-row">' +
      '<div class="ar-title">Add a new client</div>' +
      '<div class="add-row">' +
      '<input type="text" id="add-sphere-name" placeholder="Client name" ' +
      'onkeydown="if(event.key===\'Enter\')addSphere()">' +
      '<button onclick="addSphere()">+ Client</button>' +
      '</div></div>';
  }
  body.innerHTML = html;
}

function renderTile(p, s, pi, pcount) {
  const st = projectStats(p);
  const stage = stageOf(p.status);
  const dimmed = stage.closed ? ' dimmed' : '';
  let badge = '<span class="tile-badge ' + stage.cls + '">' + stage.label + '</span>';
  let stat;
  stat = '<b>' + st.total + '</b> ' + plural(st.total, 'task','tasks','tasks');
  if (st.subs > 0) stat += ' · <b>' + st.subs + '</b> ' + plural(st.subs,'subtask','subtasks','subtasks');
  const editing = editMode ? ' editing' : '';
  const clickAttr = editMode ? '' : ' onclick="openProject(' + p.num + ')"';

  let h = '<div class="tile' + dimmed + editing + '" data-pnum="' + p.num + '"' + clickAttr + '>';
  h += '<div class="tile-stripe" style="background:' + s.color + '"></div>';
  h += '<div class="tile-body">';
  h += '<div class="tile-name">';
  h += escapeHtml(p.short) + (p.isKey ? '<span class="tile-key">key</span>' : '') + '</div>';
  h += '<div class="tile-sub">client ' + s.id + ' · ' + escapeHtml(s.tag) + '</div>';
  // waiting-метка: кто блокирует
  if (p.waiting === 'me') {
    h += '<div class="tile-waiting wait-me">⏳ Waiting on me</div>';
  } else if (p.waiting === 'client') {
    h += '<div class="tile-waiting wait-client">⏳ Waiting on client</div>';
  }
  // next action
  if (p.nextAction) {
    h += '<div class="tile-next"><span class="tile-next-label">Next:</span> ' +
      escapeHtml(p.nextAction) + '</div>';
  }
  // due date
  const due = dueLabel(p);
  if (due) {
    h += '<div class="tile-due ' + due.cls + '">' + escapeHtml(due.text) + '</div>';
  }
  const upd = updatedLabel(p);
  if (upd) h += '<div class="tile-updated">' + escapeHtml(upd) + '</div>';
  const pay = paymentOf(p.payment);
  const payCls = p.payment === 'full' ? 'pay-full' : (p.payment === 'partial' ? 'pay-partial' : 'pay-none');
  h += '<div class="tile-stat">' + stat + ' ' + badge +
    ' <span class="tile-badge ' + payCls + '">' + pay.label + '</span></div>';
  h += '</div>';
  if (editMode) {
    const isFirst = pi === 0;
    const isLast  = pi === pcount - 1;
    h += '<div class="tile-edit-bar">' +
      '<button class="edit-icon-btn" title="Move up" ' + (isFirst ? 'disabled' : '') +
        ' onclick="moveProject(' + p.num + ',-1)">▲</button>' +
      '<button class="edit-icon-btn" title="Move down" ' + (isLast ? 'disabled' : '') +
        ' onclick="moveProject(' + p.num + ',1)">▼</button>' +
      '<span style="flex:1"></span>' +
      '<button class="edit-icon-btn" title="Edit project" ' +
        'onclick="editProject(' + p.num + ')">✎</button>' +
      '<button class="edit-icon-btn del" title="Delete project" ' +
        'onclick="deleteProject(' + p.num + ')">✕</button>' +
      '</div>';
  }
  h += '</div>';
  return h;
}

// ----- редактирование сфер -----
function editSphere(id) {
  const s = sphereById(id);
  if (!s) return;
  openModal('Client: ' + escapeHtml(s.name), [
    { key: 'name', label: 'Client name', value: s.name },
    { key: 'tag',  label: 'Short label (for tiles)', value: s.tag },
    { key: 'color', label: 'Colour (HEX, e.g. #1d6b51)', value: s.color }
  ], function (vals) {
    s.name = vals.name.trim() || s.name;
    s.tag = vals.tag.trim() || s.tag;
    if (/^#[0-9a-fA-F]{6}$/.test(vals.color.trim())) s.color = vals.color.trim();
    saveState(true);
    renderAll();
  });
}
function addSphere() {
  const inp = document.getElementById('add-sphere-name');
  const name = inp.value.trim();
  if (!name) { inp.focus(); return; }
  // новый id — следующая свободная буква
  const used = state.spheres.map(function (s) { return s.id; });
  let id = '';
  for (let c = 65; c <= 90; c++) {
    if (used.indexOf(String.fromCharCode(c)) === -1) { id = String.fromCharCode(c); break; }
  }
  if (!id) id = 'S' + state.spheres.length;
  state.spheres.push({ id: id, name: name, tag: name.toLowerCase().slice(0, 12), color: '#9a7b30' });
  inp.value = '';
  saveState(true);
  renderAll();
}
function deleteSphere(id) {
  const projs = state.projects.filter(function (p) { return p.sphere === id; });
  let msg = 'Delete client?';
  if (projs.length) msg = 'Client has ' + projs.length + ' ' +
    plural(projs.length,'project','projects','projects') + '. Delete the client with all its projects?';
  confirmModal(msg, function () {
    state.spheres = state.spheres.filter(function (s) { return s.id !== id; });
    state.projects = state.projects.filter(function (p) { return p.sphere !== id; });
    if (state.sphereFilter === id) state.sphereFilter = 'all';
    saveState(true);
    renderAll();
  });
}

// ----- редактирование проектов -----
function nextProjectNum() {
  let max = 0;
  state.projects.forEach(function (p) { if (p.num > max) max = p.num; });
  return max + 1;
}
function addProject(sphereId) {
  const inp = document.getElementById('add-proj-' + sphereId);
  const title = inp.value.trim();
  if (!title) { inp.focus(); return; }
  state.projects.push({
    sphere: sphereId, num: nextProjectNum(),
    title: title, short: title.slice(0, 22),
    goal: '', isKey: false, status: 'discovery', waiting: '', nextAction: '', payment: 'none', dueDate: '', updatedAt: Date.now(), tasks: []
  });

}
function editProject(num) {
  const p = state.projects.find(function (x) { return x.num === num; });
  if (!p) return;
  openModal('Edit name & goal', [
    { key: 'title', label: 'Full name', value: p.title },
    { key: 'short', label: 'Short name (for tile)', value: p.short },
    { key: 'goal',  label: 'Project goal', value: p.goal, area: true },

  });
}

// ----- перемещение проектов стрелками -----
// направление dir: -1 вверх, +1 вниз. Двигаем только внутри своей сферы.
function moveProject(num, dir) {
  const p = state.projects.find(function (x){ return x.num === num; });
  if (!p) return;
  // индексы проектов этой же сферы в общем массиве
  const sameSphere = [];
  state.projects.forEach(function (x, i) {
    if (x.sphere === p.sphere) sameSphere.push(i);
  });
  const posInSphere = sameSphere.findIndex(function (i) {
    return state.projects[i].num === num;
  });
  const swapWith = posInSphere + dir;
  if (swapWith < 0 || swapWith >= sameSphere.length) return;
  const idxA = sameSphere[posInSphere];
  const idxB = sameSphere[swapWith];
  const tmp = state.projects[idxA];
  state.projects[idxA] = state.projects[idxB];
  state.projects[idxB] = tmp;
  saveState(true);
  renderOverview();
}

// ----- перемещение сфер стрелками -----
function moveSphere(id, dir) {
  const arr = state.spheres;
  const idx = arr.findIndex(function (s){ return s.id === id; });
  if (idx < 0) return;
  const swap = idx + dir;
  if (swap < 0 || swap >= arr.length) return;
  const tmp = arr[idx];
  arr[idx] = arr[swap];
  arr[swap] = tmp;
  saveState(true);
  renderAll();
}

// ----- модалка-редактор -----
let modalCallback = null;
function openModal(title, fields, onSave) {
  const box = document.getElementById('modal-box');
  let html = '<h3>' + title + '</h3>';
  fields.forEach(function (f) {
    html += '<label>' + escapeHtml(f.label) + '</label>';
    if (f.area) {
      html += '<textarea id="modal-f-' + f.key + '">' + escapeHtml(f.value || '') + '</textarea>';
    } else if (f.date) {
      html += '<input type="date" id="modal-f-' + f.key + '" value="' + escapeHtml(f.value || '') + '">';
    } else if (f.select) {
      html += '<select id="modal-f-' + f.key + '">';
      f.select.forEach(function (o) {
        const sel = (o.value === (f.value || '')) ? ' selected' : '';
        html += '<option value="' + escapeHtml(o.value) + '"' + sel + '>' + escapeHtml(o.label) + '</option>';
      });
      html += '</select>';
    } else {
      html += '<input type="text" id="modal-f-' + f.key + '" value="' + escapeHtml(f.value || '') + '">';
    }
  });
  html += '<div class="modal-actions">' +
    '<button class="btn-cancel" onclick="closeModal()">Cancel</button>' +
    '<button class="btn-save" onclick="saveModal()">Save</button>' +
    '</div>';
  box.innerHTML = html;
  box.dataset.fields = JSON.stringify(fields.map(function (f){ return f.key; }));
  modalCallback = onSave;
  document.getElementById('modal-bg').classList.add('open');
}
function saveModal() {
  const box = document.getElementById('modal-box');
  const keys = JSON.parse(box.dataset.fields || '[]');
  const vals = {};
  keys.forEach(function (k) {
    const el = document.getElementById('modal-f-' + k);
    vals[k] = el ? el.value : '';
  });
  const cb = modalCallback;   // сохраняем до закрытия — closeModal обнуляет modalCallback
  closeModal();
  if (cb) cb(vals);
}
function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
  modalCallback = null;
}

// собственное окно подтверждения (не зависит от настроек браузера)
let confirmCallback = null;
function confirmModal(message, onYes, opts) {
  opts = opts || {};
  const okLabel = opts.okLabel || 'Delete';
  const okColor = opts.okColor || '#a33636';
  const title = opts.title || 'Confirm';
  const box = document.getElementById('modal-box');
  // поддержка переносов строк в сообщении
  const msgHtml = escapeHtml(message).replace(/\n/g, '<br>');
  box.innerHTML = '<h3>' + escapeHtml(title) + '</h3>' +
    '<p style="font-size:13.5px;color:var(--text-dim);line-height:1.55;">' + msgHtml + '</p>' +
    '<div class="modal-actions">' +
    '<button class="btn-cancel" onclick="closeConfirm()">Cancel</button>' +
    '<button class="btn-save" style="background:' + okColor + ';" onclick="acceptConfirm()">' +
      escapeHtml(okLabel) + '</button>' +
    '</div>';
  confirmCallback = onYes;
  document.getElementById('modal-bg').classList.add('open');
}
function acceptConfirm() {
  const cb = confirmCallback;
  closeConfirm();
  if (cb) cb();
}
function closeConfirm() {
  document.getElementById('modal-bg').classList.remove('open');
  confirmCallback = null;
}

// модалка с произвольным HTML и набором кнопок
// buttons: [{ label, kind:'primary'|'ghost', action: fn }]
let customModalActions = {};
function openCustomModal(title, bodyHtml, buttons) {
  const box = document.getElementById('modal-box');
  customModalActions = {};
  let btnHtml = '';
  (buttons || []).forEach(function (b, i) {
    customModalActions['b' + i] = b.action;
    const cls = b.kind === 'primary' ? 'btn-save' : 'btn-cancel';
    btnHtml += '<button class="' + cls + '" onclick="runCustomModalAction(' + i + ')">' +
      escapeHtml(b.label) + '</button>';
  });
  box.innerHTML = '<h3>' + escapeHtml(title) + '</h3>' +
    bodyHtml +
    '<div class="modal-actions">' + btnHtml + '</div>';
  document.getElementById('modal-bg').classList.add('open');
}
function runCustomModalAction(i) {
  const fn = customModalActions['b' + i];
  if (fn) fn();
}

// ----- форматирование даты -----
const WD_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MON_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function todayISO() {
  const d = new Date();
  return d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0');
}
function fmtDateHuman(iso) {
  // 'YYYY-MM-DD' -> 'чт, 5 июн'
  if (!iso) return '';
  const parts = iso.split('-');
  if (parts.length !== 3) return iso;
  const d = new Date(+parts[0], +parts[1] - 1, +parts[2]);
  if (isNaN(d.getTime())) return iso;
  return WD_SHORT[d.getDay()] + ', ' + d.getDate() + ' ' + MON_SHORT[d.getMonth()];
}
function dateRelLabel(iso) {
  // 'today' / 'tomorrow' / 'overdue' — для подсветки
  if (!iso) return '';
  const t = todayISO();
  if (iso === t) return 'today';
  if (iso < t) return 'overdue';
  // tomorrow?
  const d = new Date();
  d.setDate(d.getDate() + 1);
  const tm = d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0');
  if (iso === tm) return 'tomorrow';
  return '';
}

// сколько дней между сегодня и iso-датой (целое; отриц. = в прошлом)
function daysBetweenToday(iso) {
  if (!iso) return null;
  const parts = iso.split('-');
  if (parts.length !== 3) return null;
  const target = new Date(+parts[0], +parts[1] - 1, +parts[2]);
  const now = new Date();
  const t0 = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  return Math.round((target - t0) / 86400000);
}
// метка дедлайна для плитки: { text, cls }
function dueLabel(p) {
  if (!p.dueDate) return null;
  const d = daysBetweenToday(p.dueDate);
  const closed = stageOf(p.status).closed;
  let cls = 'due-ok', text;
  if (closed) {
    text = 'Due ' + fmtDateHuman(p.dueDate);
  } else if (d < 0) {
    cls = 'due-over'; text = 'Overdue by ' + Math.abs(d) + plural(Math.abs(d),' day',' days',' days');
  } else if (d === 0) {
    cls = 'due-soon'; text = 'Due today';
  } else if (d === 1) {
    cls = 'due-soon'; text = 'Due tomorrow';
  } else if (d <= 3) {
    cls = 'due-soon'; text = 'Due in ' + d + ' days';
  } else {
    text = 'Due ' + fmtDateHuman(p.dueDate);
  }
  return { text: text, cls: cls };
}
// проект просрочен (для сводки): дедлайн в прошлом и проект не закрыт
function isOverdue(p) {
  if (!p.dueDate) return false;
  if (stageOf(p.status).closed) return false;
  return daysBetweenToday(p.dueDate) < 0;
}
// отметить проект как изменённый сейчас
function touchProject(p) {
  if (p) p.updatedAt = Date.now();
}
// 'last updated' человекочитаемо
function updatedLabel(p) {
  if (!p.updatedAt) return '';
  const days = Math.floor((Date.now() - p.updatedAt) / 86400000);
  if (days <= 0) return 'Updated today';
  if (days === 1) return 'Updated yesterday';
  if (days < 7) return 'Updated ' + days + ' days ago';
  if (days < 14) return 'Updated last week';
  const weeks = Math.floor(days / 7);
  if (days < 60) return 'Updated ' + weeks + ' weeks ago';
  const months = Math.floor(days / 30);
  return 'Updated ' + months + ' months ago';
}

  // ----- секция задач -----
  h += '<div class="tasks-section-head">' +
    '<h3>Tasks</h3>' +
    '<span class="t-count">' + st.total + ' ' +

      (st.typed < st.total ? ' · ' + (st.total - st.typed) + ' no type' : '') +
    '</span></div>';

    (projEditMode
      ? 'This is the task store. Give a task a date and it appears in the week and day plan. Recurring tasks show up daily on their own. Edit type, date, order and subtasks here.'
      : 'This is the project task store. Mark tasks done and plan time in the Week and Day tabs. Click “Edit” to change tasks.') +

      const items = [];

      });
      if (!items.length) return;
      h += '<div class="task-group">';
      h += '<div class="task-group-label tg-' + tt.cls + '">' +
        '<span class="tg-dot"></span>' + escapeHtml(tt.label) +

      items.forEach(function (it, gi) {
        h += renderTaskCard(p, it.t, it.idx, gi, items.length);
      });
      h += '</div>';
    });

  // ----- добавление задачи -----
  if (projEditMode) {
    let typeOpts = '';

function renderTaskCard(p, t, idx, gi, gcount) {
  normalizeTask(t);
  const subsTotal = t.subs.length;
  const subsDone  = t.subs.filter(function (s){ return s.done; }).length;
  const tt = taskTypeInfo(t.type);
  const subsOpen = !!openSubsFor[idx];
  const dateOpen = !!openDateFor[idx];

  let h = '<div class="task-card" data-tidx="' + idx + '">';
  h += '<div class="task-main">';
  h += '<div class="task-text-block">';
  h += '<div class="task-name">';
  const pri = priorityInfo(t.priority);
  if (t.priority && t.priority !== 'norm') {
    h += '<span class="task-pri" title="' + escapeHtml(pri.label) + '">' + pri.icon + '</span> ';
  }
  h += escapeHtml(t.name) + '</div>';
  if (t.hint) h += '<div class="task-hint">' + escapeHtml(t.hint) + '</div>';

  // строка dated и подзадачами
  h += '<div class="task-meta-row">';
  // плашка даты / ритма
  if (t.type === 'rep') {
    h += '<span class="task-date rhythm" title="Recurs — shows in the day plan automatically">' +
      '↻ every day</span>';
  } else if (t.date) {
    const rel = dateRelLabel(t.date);
    let label = fmtDateHuman(t.date);
    if (t.time) label += ' · ' + t.time;
    let cls = 'task-date';
    let title = 'Scheduled';
    if (rel === 'overdue') { title = 'Date has passed'; }
    h += '<span class="' + cls + '" title="' + title + '">📅 ' + escapeHtml(label) +
      (rel && rel !== 'overdue' ? ' · ' + rel : '') +
      (rel === 'overdue' ? ' · overdue' : '') + '</span>';
  } else if (t.type === 'once') {
    h += '<span class="task-date unplanned" title="No date set — task not in the plan">' +
      'no date</span>';
  }
  // подзадачи
  if (subsTotal > 0) {
    h += '<button class="subs-toggle' + (subsOpen ? ' open' : '') + '" ' +
      'onclick="toggleSubs(' + idx + ')">' +
      '<span class="subs-arrow">▶</span> Subtasks ' +
      subsDone + '/' + subsTotal + '</button>';
  } else if (projEditMode) {
    h += '<button class="subs-toggle' + (subsOpen ? ' open' : '') + '" ' +
      'onclick="toggleSubs(' + idx + ')">' +
      '<span class="subs-arrow">▶</span> + add subtasks</button>';
  }
  h += '</div>';
  h += '</div>';   // task-text-block
  h += '<span class="task-type-pill ttp-' + tt.cls + '">' + escapeHtml(tt.short) + '</span>';
  h += '</div>';   // task-main

  // ----- блок выбора даты (режим правки, кроме повторяющихся) -----
  if (projEditMode && dateOpen && t.type !== 'rep') {
    h += '<div class="task-date-edit">' +
      '<label>Date</label>' +
      '<input type="date" value="' + escapeHtml(t.date || '') + '" ' +
        'onchange="setTaskDate(' + idx + ',this.value)">' +
      '<label>Time</label>' +
      '<input type="time" value="' + escapeHtml(t.time || '') + '" ' +
        'onchange="setTaskTime(' + idx + ',this.value)">';
    if (t.date || t.time) {
      h += '<button class="clear-date" onclick="clearTaskDate(' + idx + ')">Clear date</button>';
    }
    h += '</div>';
  }
  if (projEditMode && dateOpen && t.type === 'rep') {
    h += '<div class="task-date-edit">' +
      '<span class="rhythm-note">↻ A recurring task shows in the day plan every day automatically. No date needed.</span>' +
      '</div>';
  }

  // ----- блок подзадач -----
  if (subsOpen) {
    h += '<div class="subs-wrap">';
    if (subsTotal === 0) {
      h += '<div style="font-size:11.5px;color:var(--text-faint);padding:2px 0 4px;">Subtasks — a checklist of steps inside a task. They have no date of their own.</div>';
    }
    t.subs.forEach(function (sub, si) {
      h += '<div class="sub-row' + (sub.done ? ' s-done' : '') + '">';
      h += '<div class="sub-check' + (sub.done ? ' checked' : '') + '" ' +
        'onclick="toggleSub(' + idx + ',' + si + ')">' + (sub.done ? '✓' : '') + '</div>';
      h += '<div class="sub-name">' + escapeHtml(sub.name) + '</div>';
      if (projEditMode) {
        h += '<div class="sub-actions">' +
          '<button class="sub-mini-btn" title="Move up" ' + (si === 0 ? 'disabled' : '') +
            ' onclick="moveSub(' + idx + ',' + si + ',-1)">▲</button>' +
          '<button class="sub-mini-btn" title="Move down" ' + (si === subsTotal - 1 ? 'disabled' : '') +
            ' onclick="moveSub(' + idx + ',' + si + ',1)">▼</button>' +
          '<button class="sub-mini-btn" title="Rename" ' +
            'onclick="editSub(' + idx + ',' + si + ')">✎</button>' +
          '<button class="sub-mini-btn del" title="Delete" ' +
            'onclick="deleteSub(' + idx + ',' + si + ')">✕</button>' +
          '</div>';
      }
      h += '</div>';
    });
    h += '<div class="sub-add-row">' +
      '<input type="text" id="new-sub-' + idx + '" placeholder="New subtask" ' +
        'onkeydown="if(event.key===\'Enter\')addSub(' + idx + ')">' +
      '<button onclick="addSub(' + idx + ')">+</button>' +
      '</div>';
    h += '</div>';
  }

  // ----- панель правки задачи -----
  if (projEditMode) {
    let typeOpts = '';
    TASK_TYPES.forEach(function (tt2) {
      typeOpts += '<option value="' + tt2.id + '"' +
        ((t.type || '') === tt2.id ? ' selected' : '') + '>' +
        escapeHtml(tt2.label) + '</option>';
    });
    let priOpts = '';
    PRIORITIES.forEach(function (pr) {
      priOpts += '<option value="' + pr.id + '"' +
        (t.priority === pr.id ? ' selected' : '') + '>' +
        pr.icon + ' ' + escapeHtml(pr.label) + '</option>';
    });
    h += '<div class="task-edit-bar">' +
      '<button class="edit-icon-btn" title="Move up" ' + (gi === 0 ? 'disabled' : '') +
        ' onclick="moveTask(' + idx + ',-1)">▲</button>' +
      '<button class="edit-icon-btn" title="Move down" ' + (gi === gcount - 1 ? 'disabled' : '') +
        ' onclick="moveTask(' + idx + ',1)">▼</button>' +
      '<select title="Task type" onchange="setTaskType(' + idx + ',this.value)">' +
        typeOpts + '</select>' +
      '<select title="Priority" onchange="setTaskPriority(' + idx + ',this.value)">' +
        priOpts + '</select>' +
      '<button class="edit-icon-btn' + (dateOpen ? ' on-date' : '') +
        '" title="Date and time" onclick="toggleDateEdit(' + idx + ')">📅</button>' +
      '<span class="te-spacer"></span>' +
      '<button class="edit-icon-btn" title="Edit task" ' +
        'onclick="editTask(' + idx + ')">✎</button>' +
      '<button class="edit-icon-btn del" title="Delete task" ' +
        'onclick="deleteTask(' + idx + ')">✕</button>' +
      '</div>';
  }

  h += '</div>';   // task-card
  return h;
}
